# Configuration for the Realtor scraper
#
# This file drives which sites are scraped and how.  Modify the
# ``enabled_sites`` list to control which sites run during a scrape.
# Each site must have an entry in the ``sites`` mapping with a name,
# base URL and parser type.  ``locations`` can optionally be used by
# the scraper to filter results (not currently consumed by the
# simplified implementation).

enabled_sites:
  - npc
  - propertypro
  - property24

# Order in which scraping backends are attempted.  The simplified
# scraper only uses the ``requests`` backend.
fallback_order:
  - requests

# Optional list of target locations (not yet used by the core logic)
locations:
  - Lekki Phase 1
  - Ikate
  - Chevron

sites:
  npc:
    name: Nigeria Property Centre
    url: https://nigeriapropertycentre.com/for-sale
    parser: special
  propertypro:
    name: PropertyPro Nigeria
    url: https://propertypro.ng/property-for-sale
    parser: special
  property24:
    name: Property24 Nigeria
    url: https://www.property24.com.ng/property-for-sale
    parser: special